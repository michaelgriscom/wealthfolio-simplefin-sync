name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Mirrors the release bundle job: a lockfile/build break fails the PR
      # here instead of slipping through to a release with no attached bundle.
      - run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Build addon bundle
        run: pnpm bundle
